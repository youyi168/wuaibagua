name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Install Kivy dependencies
      run: |
        # 安装 Kivy 和 Windows 特定依赖
        pip install kivy kivy-deps.sdl2 kivy-deps.glew kivy-deps.gstreamer
        pip install pillow
        
    - name: Install PyInstaller
      run: |
        pip install pyinstaller pyinstaller-hooks-contrib
        
    - name: Verify installation
      run: |
        python --version
        pip list | findstr kivy
        pip list | findstr pyinstaller
        
    - name: Check project structure
      run: |
        echo "=== Project structure ==="
        dir
        echo "=== Data directory ==="
        dir data
        echo "=== Fonts directory ==="
        dir fonts
        echo "=== main.py exists ==="
        if (Test-Path main.py) { echo "✓ main.py found" } else { echo "✗ main.py not found" }
    
    - name: Build EXE
      run: |
        # 使用命令行参数打包（不依赖 spec 文件）
        pyinstaller `
          --name="吾爱八卦" `
          --windowed `
          --onefile `
          --add-data="data;data" `
          --add-data="fonts;fonts" `
          --hidden-import=kivy `
          --hidden-import=kivy.uix `
          --hidden-import=kivy.core `
          --hidden-import=kivy.graphics `
          --hidden-import=kivy.factory_registers `
          --hidden-import=kivy.text.sdl2 `
          --hidden-import=PIL `
          --noconfirm `
          --clean `
          --log-level=INFO `
          main.py
      shell: pwsh
    
    - name: Check build output
      run: |
        echo "=== Dist directory ==="
        dir dist
        echo "=== EXE file info ==="
        if (Test-Path "dist\吾爱八卦.exe") {
          $file = Get-Item "dist\吾爱八卦.exe"
          echo "File: $($file.Name)"
          echo "Size: $([math]::Round($file.Length / 1MB, 2)) MB"
        } else {
          echo "✗ EXE not found!"
        }
      shell: pwsh
    
    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: wuaibagua-windows-exe
        path: dist/吾爱八卦.exe
        retention-days: 30
        if-no-files-found: error
    
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs-windows
        path: |
          build/吾爱八卦/*.log
          build/吾爱八卦/warn-吾爱八卦.txt
        if-no-files-found: ignore
    
    - name: Create Release (on tag)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/吾爱八卦.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
