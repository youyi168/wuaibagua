name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Install Kivy dependencies
      run: |
        # 安装 Kivy 和 Windows 特定依赖
        pip install kivy kivy-deps.sdl2 kivy-deps.glew kivy-deps.gstreamer
        pip install pillow
        
    - name: Install PyInstaller
      run: |
        pip install pyinstaller pyinstaller-hooks-contrib
        
    - name: Verify installation
      run: |
        python --version
        pip list | findstr kivy
        pip list | findstr pyinstaller
        
    - name: Check project structure
      run: |
        echo "=== Project structure ==="
        dir
        echo "=== Data directory ==="
        dir data
        echo "=== Fonts directory ==="
        dir fonts
        echo "=== main.py exists ==="
        if (Test-Path main.py) { echo "✓ main.py found" } else { echo "✗ main.py not found" }
    
    - name: Build EXE
      run: |
        # 设置环境变量避免 Kivy 初始化 OpenGL（关键！）
        $env:PYINSTALLER_ANALYZE = "1"
        $env:CI = "true"
        $env:KIVY_NO_ARGS = "1"
        $env:KIVY_LOG_MODE = "PYTHON"
        $env:KIVY_GL_BACKEND = "angle"
        
        # 使用 spec 文件打包
        pyinstaller wuaibagua.spec --noconfirm --clean --log-level=INFO
      shell: pwsh
    
    - name: Check build output
      run: |
        echo "=== Dist directory ==="
        dir dist
        echo "=== EXE file info ==="
        if (Test-Path "dist\我爱八卦.exe") {
          $file = Get-Item "dist\我爱八卦.exe"
          echo "File: $($file.Name)"
          echo "Size: $([math]::Round($file.Length / 1MB, 2)) MB"
        } else {
          echo "✗ EXE not found!"
        }
      shell: pwsh
    
    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: wuaibagua-windows-exe
        path: dist/我爱八卦.exe
        retention-days: 30
        if-no-files-found: error
    
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs-windows
        path: |
          build/我爱八卦/*.log
          build/我爱八卦/warn-我爱八卦.txt
        if-no-files-found: ignore
    
    - name: Create Release (on tag)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/我爱八卦.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
