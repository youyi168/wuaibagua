name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev \
          python3-pip python3-venv \
          libffi-dev libssl-dev \
          automake cmake
    
    - name: Install Buildozer
      run: |
        pip3 install buildozer cython virtualenv
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        export PATH="$HOME/.local/bin:$PATH"
        which buildozer
        buildozer --version
    
    - name: Prepare build directory
      run: |
        # 项目结构已经是根目录模式，不需要复制
        # 只需确保 data/ 和 fonts/ 目录存在
        echo "=== Project structure ==="
        ls -la
        echo "=== Checking data/ ==="
        ls data/ | head -5
        echo "=== Checking fonts/ ==="
        ls -la fonts/ || echo "No fonts directory"
        echo "=== Checking buildozer.spec ==="
        cat buildozer.spec | grep -E "minapi|ndk_api|api|add_assets"
    
    - name: Build APK
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        # 直接在根目录运行 buildozer
        buildozer android debug 2>&1 | tee build.log
      timeout-minutes: 60
      continue-on-error: false
    
    - name: Check build output
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Bin directory ==="
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        echo "=== Build log (last 100 lines) ==="
        tail -100 build.log 2>/dev/null || echo "No build.log"
        echo "=== .buildozer directory ==="
        ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
    
    - name: Find APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | tee /tmp/apk_files.txt || true
        echo "=== APK files found ==="
        cat /tmp/apk_files.txt || echo "No APK files found"
        echo "=== Bin directory ==="
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        echo "=== .buildozer structure ==="
        ls -la .buildozer/android/platform/ 2>/dev/null || echo "No platform directory"
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: wuaibagua-apk
        path: |
          bin/*.apk
          *.apk
          .buildozer/android/platform/build*/dists/*/build/outputs/apk/*/*.apk
          .buildozer/android/platform/build*/dists/*/build/outputs/apk/*/*/*.apk
          .buildozer/android/platform/build*/dists/**/apk/**/*.apk
        if-no-files-found: warn
    
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          build.log
          .buildozer/logs/*.txt
        if-no-files-found: warn
