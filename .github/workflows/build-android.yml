name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev \
          python3-pip python3-venv \
          libffi-dev libssl-dev \
          automake cmake \
          libgtk-3-dev
    
    - name: Configure Git and Network
      run: |
        # 配置 Git 使用 HTTPS 并设置重试
        git config --global http.sslVerify true
        git config --global http.postBuffer 524288000
        git config --global http.maxRequestBuffer 524288000
        git config --global http.lowSpeedLimit 1000
        git config --global http.lowSpeedTime 300
        
        # 配置 pip 重试
        pip3 config set global.retries 5
        pip3 config set global.timeout 120
    
    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install Cython==0.29.36
        pip3 install buildozer==1.5.0
        pip3 install virtualenv
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    
    - name: Prepare build directory
      run: |
        echo "=== Project structure ==="
        ls -la
        echo ""
        echo "=== Data directory ==="
        ls -la data/ 2>/dev/null | head -10 || echo "No data directory"
        echo ""
        echo "=== Fonts directory ==="
        ls -la fonts/ 2>/dev/null || echo "No fonts directory"
        echo ""
        echo "=== Buildozer API config ==="
        cat buildozer.spec | grep -E "^android\.(api|minapi|ndk_api)" || true
    
    - name: Build APK with retry
      id: build_apk
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        # 设置环境变量增强稳定性
        export PYTHONHTTPSVERIFY=1
        export PIP_CERT=/etc/ssl/certs/ca-certificates.crt
        export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
        export REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
        
        # 带重试的构建
        MAX_RETRIES=3
        RETRY_COUNT=0
        BUILD_SUCCESS=false
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$BUILD_SUCCESS" = "false" ]; do
          echo "=== Build attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES ==="
          
          if buildozer android debug 2>&1 | tee build.log; then
            BUILD_SUCCESS=true
            echo "=== Build successful! ==="
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "=== Build failed, retrying in 30 seconds... ==="
              sleep 30
              # 清理可能损坏的缓存
              rm -rf .buildozer/android/platform/build-*/build/bootstrap_builds
            fi
          fi
        done
        
        if [ "$BUILD_SUCCESS" = "false" ]; then
          echo "=== Build failed after $MAX_RETRIES attempts ==="
          exit 1
        fi
      timeout-minutes: 90
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Find and copy APK
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | tee /tmp/apk_files.txt
        
        mkdir -p release
        
        # 复制找到的 APK 文件
        if [ -s /tmp/apk_files.txt ]; then
          while IFS= read -r apk; do
            echo "Found: $apk"
            cp -v "$apk" release/ 2>/dev/null || true
          done < /tmp/apk_files.txt
        fi
        
        # 也检查 bin 目录
        if [ -d "bin" ]; then
          cp -v bin/*.apk release/ 2>/dev/null || true
        fi
        
        echo "=== Release directory contents ==="
        ls -la release/ || echo "No release directory"
        
        # 设置输出变量
        APK_COUNT=$(ls -1 release/*.apk 2>/dev/null | wc -l)
        echo "apk_count=$APK_COUNT" >> $GITHUB_OUTPUT
      id: find_apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: woaibagua-apk-${{ github.run_number }}
        path: |
          bin/*.apk
          release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          build.log
          .buildozer/android/platform/build-*/build.log 2>/dev/null || true
        if-no-files-found: ignore
        retention-days: 7
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Summary
      if: always()
      run: |
        echo "=== Build Summary ==="
        echo "Build Status: ${{ job.status }}"
        echo "APK Files Found: ${{ steps.find_apk.outputs.apk_count || '0' }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "Commit: ${{ github.sha }}"
