name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev \
          python3-pip python3-venv \
          libffi-dev libssl-dev \
          automake cmake
    
    - name: Install Buildozer
      run: |
        pip3 install buildozer cython virtualenv
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        export PATH="$HOME/.local/bin:$PATH"
        which buildozer
        buildozer --version
    
    - name: Build APK
      run: |
        cd android
        export PATH="$HOME/.local/bin:$PATH"
        buildozer android debug 2>&1 | tee build.log
      timeout-minutes: 45
      continue-on-error: true
    
    - name: Check build output
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Android directory ==="
        ls -la android/
        echo "=== Bin directory ==="
        ls -la android/bin/ 2>/dev/null || echo "No bin directory"
        echo "=== Build log (last 50 lines) ==="
        tail -50 android/build.log 2>/dev/null || echo "No build.log"
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: wuaibagua-apk
        path: |
          android/bin/*.apk
          android/*.apk
        if-no-files-found: warn
    
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          android/build.log
          android/.buildozer/logs/*.txt
        if-no-files-found: warn
