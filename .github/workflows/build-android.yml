name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Clear Buildozer cache (force rebuild)
      run: |
        echo "🧹 Clearing Buildozer cache to force fresh build..."
        rm -rf ~/.buildozer
        rm -rf .buildozer
        echo "✅ Cache cleared"
    
    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-buildozer-${{ github.run_id }}-${{ hashFiles('buildozer.spec', 'requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install system dependencies (Minimal)
      run: |
        echo "📦 Installing minimal system dependencies..."
        sudo apt-get update -qq
        
        # Buildozer 核心依赖（精简版）
        sudo apt-get install -y --no-install-recommends \
          git zip unzip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev liblzma-dev \
          python3-pip python3-venv \
          libffi-dev libssl-dev \
          automake cmake \
          libgtk-3-dev \
          libgl1-mesa-dev libglu1-mesa-dev \
          libbz2-dev libreadline-dev libsqlite3-dev \
          libxml2-dev \
          wget curl ca-certificates || {
          echo "::error::系统依赖安装失败"
          exit 1
        }
        
        # 验证安装
        echo ""
        echo "📋 Verifying installed packages:"
        echo "  git: $(git --version 2>&1 | head -1)"
        echo "  cmake: $(cmake --version | head -1)"
        echo "  python3: $(python3 --version)"
        echo "  pip3: $(pip3 --version | head -1)"
        
        echo "✅ Minimal dependencies installed"
    
    - name: Configure Git and Network
      run: |
        git config --global http.sslVerify true
        git config --global http.postBuffer 524288000
        git config --global http.maxRequestBuffer 524288000
        git config --global http.lowSpeedLimit 1000
        git config --global http.lowSpeedTime 300
        
        pip3 config set global.retries 5
        pip3 config set global.timeout 120
        
        echo "✅ Git and network configured"
    
    - name: Install Buildozer (Stable)
      run: |
        echo "📦 Installing Buildozer..."
        
        # 升级 pip
        pip3 install --upgrade pip setuptools wheel
        
        # 安装 Cython (兼容版本)
        echo "Installing Cython..."
        pip3 install "Cython<3.0"
        
        # 安装 Buildozer
        echo "Installing Buildozer..."
        pip3 install buildozer==1.5.0
        
        # 安装虚拟环境工具
        pip3 install virtualenv
        
        # 添加 PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        
        # 验证安装
        echo "✅ Buildozer installed"
        buildozer --version
        
        # 显示 Python 环境
        echo ""
        echo "📋 Python environment:"
        python3 --version
        pip3 --version
        cython --version
        buildozer --version
    
    - name: Debug build environment
      run: |
        echo "=========================================="
        echo "🔍 Build Environment Debug"
        echo "=========================================="
        echo "Python version:"
        python3 --version
        
        echo ""
        echo "Buildozer version:"
        buildozer --version
        
        echo ""
        echo "Working directory:"
        pwd
        
        echo ""
        echo "=========================================="
        echo "📦 Project Structure"
        echo "=========================================="
        ls -la
        
        echo ""
        echo "📁 Data directory:"
        ls -la data/ 2>/dev/null | head -10 || echo "No data directory"
        
        echo ""
        echo "📁 Fonts directory:"
        ls -la fonts/ 2>/dev/null || echo "No fonts directory"
        
        echo ""
        echo "📁 Sounds directory:"
        ls -la sounds/ 2>/dev/null || echo "No sounds directory"
        
        echo ""
        echo "📋 Buildozer config:"
        cat buildozer.spec | grep -E "^(version|package\.|android\.|source\.)" || true
        
        echo ""
        echo "📊 Python files count:"
        find . -name "*.py" -type f | wc -l
        
        echo ""
        echo "🔍 Checking main module:"
        ls -la main.py src/wuaibagua_kivy.py 2>/dev/null || echo "Main module not found"
        
        echo "=========================================="
    
    - name: Build APK with retry
      id: build_apk
      run: |
        echo "=========================================="
        echo "🔨 Starting APK Build"
        echo "=========================================="
        
        export PATH="$HOME/.local/bin:$PATH"
        
        export PYTHONHTTPSVERIFY=1
        export PIP_CERT=/etc/ssl/certs/ca-certificates.crt
        export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
        export REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
        
        echo "📋 Build configuration:"
        echo "  PATH: $PATH"
        echo "  PYTHONHTTPSVERIFY: $PYTHONHTTPSVERIFY"
        echo ""
        
        MAX_RETRIES=3
        RETRY_COUNT=0
        BUILD_SUCCESS=false
        
        echo "⏱️ Build started at: $(date)"
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$BUILD_SUCCESS" = "false" ]; do
          echo "=========================================="
          echo "🔨 Build attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES"
          echo "⏱️ Time: $(date)"
          echo "=========================================="
          
          if buildozer android debug 2>&1 | tee build.log; then
            BUILD_SUCCESS=true
            echo "=========================================="
            echo "✅ Build successful!"
            echo "⏱️ Completed at: $(date)"
            echo "=========================================="
          else
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "=========================================="
              echo "⚠️ Build failed, retrying in 30 seconds..."
              echo "⏱️ Retry at: $(date)"
              echo "=========================================="
              sleep 30
              rm -rf .buildozer/android/platform/build-*/build/bootstrap_builds
            fi
          fi
        done
        
        if [ "$BUILD_SUCCESS" = "false" ]; then
          echo "=========================================="
          echo "❌ Build failed after $MAX_RETRIES attempts"
          echo "⏱️ Failed at: $(date)"
          echo "=========================================="
          echo ""
          echo "📋 Last 100 lines of build log:"
          tail -100 build.log || true
          exit 1
        fi
        
        echo ""
        echo "📊 Build log saved to: build.log"
      timeout-minutes: 90
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Find and copy APK
      id: find_apk
      run: |
        echo "=========================================="
        echo "🔍 Searching for APK files"
        echo "=========================================="
        
        BUILD_DIR=".buildozer/android/bin"
        RELEASE_DIR="release"
        
        mkdir -p "$RELEASE_DIR"
        
        APK_COUNT=0
        
        # 1. Buildozer 标准输出路径
        if [ -d "$BUILD_DIR" ]; then
          echo "📁 Checking Buildozer output directory: $BUILD_DIR"
          for apk in "$BUILD_DIR"/*.apk; do
            if [ -f "$apk" ]; then
              echo "✅ Found: $apk"
              cp -v "$apk" "$RELEASE_DIR/"
              APK_COUNT=$((APK_COUNT + 1))
            fi
          done
        fi
        
        # 2. 检查 bin 目录（兼容旧版本）
        if [ -d "bin" ]; then
          echo "📁 Checking bin directory"
          for apk in bin/*.apk; do
            if [ -f "$apk" ]; then
              echo "✅ Found: $apk"
              cp -v "$apk" "$RELEASE_DIR/" || true
              APK_COUNT=$((APK_COUNT + 1))
            fi
          done
        fi
        
        # 3. 全局查找（排除 .buildozer）
        echo "📁 Searching entire project (excluding .buildozer)"
        find . -path "./.buildozer" -prune -o -path "./release" -prune -o -name "*.apk" -type f -print | while read apk; do
          echo "✅ Found (other): $apk"
          cp -v "$apk" "$RELEASE_DIR/" || true
        done
        
        # 重新统计
        FINAL_COUNT=$(ls -1 "$RELEASE_DIR"/*.apk 2>/dev/null | wc -l)
        
        echo ""
        echo "=========================================="
        echo "📊 APK Summary"
        echo "=========================================="
        echo "Total APK files found: $FINAL_COUNT"
        echo ""
        echo "Release directory contents:"
        ls -lh "$RELEASE_DIR/" || echo "No files in release directory"
        echo "=========================================="
        
        # 设置输出变量
        echo "apk_count=$FINAL_COUNT" >> $GITHUB_OUTPUT
        echo "apk_path=$RELEASE_DIR" >> $GITHUB_OUTPUT
        
        # 如果没找到 APK，显示错误
        if [ "$FINAL_COUNT" -eq 0 ]; then
          echo "::error::未找到 APK 文件！"
          echo "请检查构建日志"
          exit 1
        fi
        
        # 显示 APK 信息
        if [ "$FINAL_COUNT" -gt 0 ]; then
          echo ""
          echo "📱 APK Information:"
          for apk in "$RELEASE_DIR"/*.apk; do
            if [ -f "$apk" ]; then
              echo "  File: $(basename $apk)"
              echo "  Size: $(ls -lh $apk | awk '{print $5}')"
              echo "  Path: $apk"
              echo ""
            fi
          done
        fi
    
    - name: Upload APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: woaibagua-apk-${{ github.run_number }}
        path: |
          release/*.apk
        if-no-files-found: error
        retention-days: 30
    
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          build.log
          .buildozer/android/platform/build-*/build.log
        if-no-files-found: ignore
        retention-days: 7
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/*.apk
        generate_release_notes: true
        fail_on_unmatched_files: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Summary
      if: always()
      run: |
        echo "=========================================="
        echo "📋 Build Summary"
        echo "=========================================="
        echo "Status: ${{ job.status }}"
        echo "Run Number: ${{ github.run_number }}"
        echo "Commit: ${{ github.sha }}"
        echo "Branch/Tag: ${{ github.ref }}"
        echo "APK Count: ${{ steps.find_apk.outputs.apk_count }}"
        echo ""
        
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Build completed successfully!"
        else
          echo "❌ Build failed!"
        fi
        
        echo "=========================================="
